<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إتمام الطلب | شايب شوب</title>
  <link rel="stylesheet" href="css/storely.css">
</head>
<body class="checkout-page">
  <div class="desktop-main checkout-page-inner">
    <div class="desktop-two-col checkout-grid">
      <div class="checkout-left">
        <section class="checkout-card mobile-only">
          <h1 id="checkoutHeading">إتمام الطلب والدفع</h1>
          <p class="checkout-lead" id="checkoutLead">الدفع عبر شام كاش فقط</p>
          <div id="selectedPlan" class="selected-plan"></div>
        </section>

        <div class="desktop-checkout-section desktop-only">
          <h3 id="desktopDeliveryTitle">عنوان التسليم</h3>
          <div class="desktop-address-box" id="desktopAddressPreview"></div>
        </div>

        <div class="desktop-checkout-section checkout-form-panel">
          <h3 class="desktop-only" id="desktopPaymentTitle">الدفع عبر شام كاش</h3>

          <form id="paymentForm" class="form-grid checkout-form">
            <label id="payerNameLabel">الاسم<input id="payerName" type="text" required></label>
            <label id="payerPhoneLabel">رقم سوري<input id="payerPhone" type="tel" placeholder="09xxxxxxxx" required></label>
            <label class="full" id="payerAddressLabel">موقع التسليم<textarea id="payerAddress" required placeholder="المدينة، الحي، معلم قريب..."></textarea></label>
            <label id="deliveryTimeLabel">موعد الاستلام
              <select id="deliveryTime" required>
                <option value="">اختر الفترة المناسبة</option>
                <option value="near">خلال 3–5 أيام عمل</option>
                <option value="week">خلال أسبوع</option>
                <option value="far">خلال 10–14 يوماً</option>
              </select>
            </label>
            <p class="schedule-hint full" id="scheduleHint"></p>

            <div id="shamCashBox" class="sham-cash-box full desktop-sham-box">
              <strong id="shamCashTitle">تحويل شام كاش</strong>
              <p id="shamCashHint">حوّل المبلغ إلى الرقم التالي:</p>
              <img src="assets/images/sham-cash-barcode.svg" alt="Sham Cash Barcode" class="sham-cash-barcode">
              <p class="sham-cash-meta"><span id="shamCashAccountLabel">اسم الحساب:</span> <strong id="shamCashAccountName">—</strong></p>
              <div class="sham-cash-number" id="shamCashNumber">—</div>
              <label id="shamCashRefLabel">رقم عملية التحويل<input id="shamCashRef" type="text" placeholder="اختياري"></label>
            </div>
            <input type="hidden" name="payMethod" value="sham_cash">

            <label class="full" id="payerNotesLabel">ملاحظات<input id="payerNotes" type="text" placeholder="اختياري"></label>
            <button class="primary-btn full mobile-only" type="submit" id="submitOrderBtn">تأكيد الطلب والدفع</button>
          </form>
          <div id="paymentMessage" class="form-message"></div>
        </div>
      </div>

      <aside id="desktopCheckoutSummary" class="checkout-sidebar desktop-only"></aside>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/db-config.js"></script>
  <script src="js/database.js"></script>
  <script src="js/storely-data.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/desktop-shell.js"></script>
  <script src="js/nav-shell.js"></script>
  <script src="js/payment-storely.js"></script>
</body>
</html>
