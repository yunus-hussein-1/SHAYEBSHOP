<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول | Shayeb Shop</title>
  <link rel="stylesheet" href="css/storely.css">
</head>
<body>
  <main class="auth-page">
    <div class="auth-visual">
      <img src="assets/images/auth-hero.svg" alt="Shayeb Shop">
    </div>
    <section class="auth-card">
      <a class="brand centered" href="index.html">
        <img src="assets/images/shop-logo.svg" alt="Shayeb Shop" class="brand-logo">
        <div class="brand-text">
          <span class="brand-title">Shayeb Shop</span>
          <small class="brand-sub">شايب شوب</small>
        </div>
      </a>

      <button class="google-btn" id="googleLoginBtn" type="button">
        <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        تسجيل الدخول باستخدام Google
      </button>

      <div class="auth-divider">أو</div>

      <div class="auth-tabs">
        <button class="tab-btn active" type="button">دخول</button>
        <button class="tab-btn" type="button">حساب جديد</button>
      </div>

      <form id="loginForm" class="stack-form auth-panel active">
        <input id="loginEmail" type="email" placeholder="البريد الإلكتروني" required>
        <input id="loginPassword" type="password" placeholder="كلمة المرور" required>
        <button class="primary-btn" type="submit">دخول</button>
      </form>

      <form id="signupForm" class="stack-form auth-panel">
        <input id="signupName" type="text" placeholder="الاسم" required>
        <input id="signupEmail" type="email" placeholder="البريد الإلكتروني" required>
        <input id="signupPassword" type="password" placeholder="كلمة المرور" minlength="6" required>
        <button class="primary-btn" type="submit">إنشاء حساب</button>
      </form>

      <div id="authMessage" class="form-message"></div>
      <a href="index.html" class="auth-back">← العودة للمتجر</a>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/db-config.js"></script>
  <script src="js/database.js"></script>
  <script src="js/storely-data.js"></script>
  <script src="js/login-storely.js"></script>
</body>
</html>
