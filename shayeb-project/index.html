<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHAYEB SHOP | متجر الشايب</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-in">
    <button id="sellLink" data-i="topSell"></button>
    <button id="aboutLink" data-i="topAbout"></button>
    <button id="helpLink" data-i="topHelp"></button>
    <div class="lang-wrap">
      <button class="lang-btn" id="langBtn">🌐 <span id="langLabel">العربية</span> ▾</button>
      <div class="lang-menu" id="langMenu">
        <button data-lang="ar">🇸🇾 العربية <small>ل.س</small></button>
        <button data-lang="en">🇬🇧 English <small>$</small></button>
        <button data-lang="tr">🇹🇷 Türkçe <small>₺</small></button>
      </div>
    </div>
  </div>
</div>

<!-- Header -->
<header class="header">
  <div class="header-in">
    <a href="#" class="logo" id="logoHome" aria-label="SHAYEB SHOP — متجر الشايب">
      <span class="logo-en">SHAYEB <span class="accent">SHOP</span></span>
      <span class="logo-ar">متجر الشايب</span>
      <span class="logo-line"></span>
    </a>
    <div class="search">
      <span class="s-ico">🔍</span>
      <input type="search" id="searchInput" aria-label="search">
      <button class="cam-btn" id="camBtn" title="بحث بالكاميرا" aria-label="search by camera">📷</button>
      <input type="file" id="camFile" accept="image/*" style="display:none">
    </div>
    <div class="h-actions">
      <div class="user-wrap">
        <button class="h-btn login-cta" id="loginBtn"><span class="ico">👤</span><span class="lbl" data-i="login"></span></button>
        <button class="h-btn" id="userBtn" style="display:none"><span class="ico">👤</span><span class="lbl" id="userName"></span> ▾</button>
        <div class="user-menu" id="userMenu">
          <div class="um-head"><b id="umName"></b><span id="umEmail"></span></div>
          <button data-acc="profile">🪪 <span data-i="myProfile"></span></button>
          <button data-acc="orders">📦 <span data-i="myOrders"></span></button>
          <button data-acc="addresses">📍 <span data-i="myAddresses"></span></button>
          <button data-acc="settings">⚙️ <span data-i="settings"></span></button>
          <button class="um-out" id="logoutBtn">🚪 <span data-i="logout"></span></button>
        </div>
      </div>
      <button class="h-btn" id="favBtn"><span class="ico">🤍</span><span class="lbl" data-i="favorites"></span><span class="badge" id="favBadge" style="display:none">0</span></button>
      <button class="h-btn" id="cartBtn"><span class="ico">🛒</span><span class="lbl" data-i="cart"></span><span class="badge" id="cartBadge" style="display:none">0</span></button>
    </div>
  </div>
  <nav class="nav">
    <div class="nav-in" id="navIn"></div>
    <div class="mega" id="mega"><div class="mega-in" id="megaIn"></div></div>
  </nav>
</header>

<main>
  <!-- HOME VIEW -->
  <div id="homeView">
    <section class="wrap">
      <div class="sec-head"><h2><span class="bar"></span><span data-i="bestTitle"></span></h2><button class="see-all" id="goDeals"></button></div>
      <div class="grid" id="grid"></div>
      <div class="empty-hint" id="noResults" style="display:none"><div class="big">🔎</div><span data-i="noResults"></span></div>
    </section>
    <section class="wrap" style="padding-top:6px;display:none" id="postsSec">
      <div class="sec-head"><h2><span class="bar"></span><span data-i="storePosts"></span></h2></div>
      <div class="posts" id="postsGrid"></div>
    </section>
    <section class="wrap" style="padding-top:6px"><div class="trust" id="trust"></div></section>

  </div>

  <!-- DEALS VIEW (قسم عروض الشايب — من نافذة جديد) -->
  <div id="dealsView" style="display:none">
    <section class="wrap">
      <div class="sec-head"><h2><span class="bar"></span><span data-i="dealsTitle"></span></h2></div>
      <div class="banners" id="banners"></div>
    </section>
    <section class="wrap" style="padding-top:4px">
      <div class="flash">
        <div class="f-title">⚡ <span data-i="flashTitle"></span></div>
        <div class="timer"><span id="tH">01</span>:<span id="tM">54</span>:<span id="tS">43</span></div>
      </div>
    </section>
    <section class="wrap" style="padding-top:8px">
      <div class="sec-head"><h2><span class="bar"></span><span data-i="dealsGrid"></span></h2></div>
      <div class="grid" id="dealsGridEl"></div>
    </section>
  </div>
</main>

<footer>
  <div class="foot-in">
    <div>
      <div class="f-logo-en">SHAYEB <span class="accent">SHOP</span></div>
      <div style="font-size:13px;font-weight:700;opacity:.85">متجر الشايب</div>
      <p class="f-desc" data-i="footDesc"></p>
      <div class="f-pay"><span data-i="footPay"></span><span class="chip">شام كاش · Sham Cash</span></div>
    </div>
    <div><h5 data-i="footShop"></h5><ul id="footShopList"></ul></div>
    <div><h5 data-i="footHelpT"></h5><ul id="footHelpList"></ul></div>
    <div><h5 data-i="footCorp"></h5><ul id="footCorpList"></ul></div>
  </div>
  <div class="f-bottom" id="footBottom"></div>
</footer>

<!-- Auth modal -->
<div class="overlay" id="authOverlay">
  <div class="modal">
    <div class="m-head">
      <button class="m-close" data-close="authOverlay">✕</button>
      <h3 data-i="authTitle"></h3><p data-i="authSub"></p>
    </div>
    <div class="m-tabs">
      <button id="tabLogin" class="active" data-i="tabLogin"></button>
      <button id="tabSignup" data-i="tabSignup"></button>
    </div>
    <div class="m-body">
      <div id="authMain" style="display:flex;flex-direction:column;gap:12px">
        <div class="field" id="fName" style="display:none"><label data-i="fullName"></label><div class="f-in"><input type="text" id="inName" autocomplete="name"></div></div>
        <div class="field"><label data-i="email"></label><div class="f-in"><input type="email" id="inEmail" dir="ltr" placeholder="name@email.com"></div></div>
        <div class="field"><label data-i="password"></label><div class="f-in">
          <input type="password" id="inPass" dir="ltr" placeholder="••••••••">
          <button class="toggle-pass" id="togglePass">👁️</button></div></div>
        <label class="agree-chk" id="termsRow" style="display:none"><input type="checkbox" id="signTerms"><span data-i="termsChk"></span></label>
        <div class="f-err" id="authErr"></div>
        <button class="m-submit" id="authSubmit"></button>
        <div class="or-div" data-i="orContinue"></div>
        <div class="g-wrap"><div id="gBtn"></div></div>
        <button class="see-all" id="forgotLink" data-i="forgotPass" style="align-self:center"></button>
        <p class="m-note" data-i="authNote"></p>
      </div>
      <div id="authReset" style="display:none;flex-direction:column;gap:12px">
        <div class="field"><label data-i="email"></label><div class="f-in"><input type="email" id="rEmail" dir="ltr" placeholder="name@email.com"></div></div>
        <button class="m-submit" id="rSend" data-i="sendCode"></button>
        <div id="rStep2" style="display:none;flex-direction:column;gap:12px">
          <p class="m-note" id="rInfo" style="color:var(--green-dark);font-weight:800;text-align:start"></p>
          <div class="field"><label data-i="codeLbl"></label><div class="f-in"><input id="rCode" dir="ltr" inputmode="numeric" placeholder="••••••"></div></div>
          <div class="field"><label data-i="newPass"></label><div class="f-in"><input type="password" id="rNew" dir="ltr"></div></div>
          <div class="field"><label data-i="confirmPass"></label><div class="f-in"><input type="password" id="rConf" dir="ltr"></div></div>
          <button class="m-submit" id="rGo" data-i="doReset"></button>
        </div>
        <div class="f-err" id="rErr"></div>
        <button class="see-all" id="backLoginBtn" data-i="backLogin" style="align-self:center"></button>
      </div>
    </div>
  </div>
</div>

<!-- Camera search modal -->
<div class="overlay" id="camOverlay">
  <div class="modal wide">
    <div class="m-head"><button class="m-close" data-close="camOverlay">✕</button><h3>📷 <span data-i="camTitle"></span></h3><p data-i="camHint"></p></div>
    <div class="m-body" id="camBody"></div>
  </div>
</div>

<!-- Product modal -->
<div class="overlay" id="prodOverlay">
  <div class="modal xl">
    <div class="m-head"><button class="m-close" data-close="prodOverlay">✕</button><h3 data-i="prodDetails"></h3></div>
    <div class="m-body" id="prodBody"></div>
  </div>
</div>

<!-- Seller modal -->
<div class="overlay" id="sellOverlay">
  <div class="modal wide">
    <div class="m-head"><button class="m-close" data-close="sellOverlay">✕</button><h3>🏪 <span data-i="sellTitle"></span></h3><p data-i="sellSub"></p></div>
    <div class="m-body" id="sellBody"></div>
  </div>
</div>

<!-- Checkout modal -->
<div class="overlay" id="payOverlay">
  <div class="modal wide">
    <div class="m-head"><button class="m-close" data-close="payOverlay">✕</button><h3>💳 <span data-i="payTitle"></span></h3></div>
    <div class="m-body" id="payBody"></div>
  </div>
</div>

<!-- Cart drawer -->
<div class="overlay" id="drawerOverlay" style="z-index:590"></div>
<aside class="drawer" id="cartDrawer">
  <div class="d-head"><h3>🛒 <span data-i="cartTitle"></span></h3><button id="cartClose" style="font-size:18px">✕</button></div>
  <div class="d-body" id="cartBody"></div>
  <div class="d-foot" id="cartFoot" style="display:none">
    <div id="shipBox"></div>
    <div class="d-total"><span data-i="total"></span><span id="cartTotal"></span></div>
    <button class="d-checkout" id="checkoutBtn" data-i="checkout"></button>
  </div>
</aside>

<!-- Account page -->
<div class="page-overlay" id="accPage">
  <div class="acc-head"><div class="acc-head-in">
    <div class="avatar" id="accAvatar">ش</div>
    <div><h2 id="accName"></h2><p id="accEmail"></p></div>
    <button class="acc-back" id="accBack">← <span data-i="backToShop"></span></button>
  </div></div>
  <div class="acc-body">
    <div class="acc-side" id="accSide">
      <button data-panel="profile" class="active">🪪 <span data-i="myProfile"></span></button>
      <button data-panel="orders">📦 <span data-i="myOrders"></span></button>
      <button data-panel="favorites">❤️ <span data-i="favorites"></span></button>
      <button data-panel="addresses">📍 <span data-i="myAddresses"></span></button>
      <button data-panel="settings">⚙️ <span data-i="settings"></span></button>
    </div>
    <div class="acc-panel" id="accPanel"></div>
  </div>
</div>

<!-- Info pages modal (من نحن/الشروط/الخصوصية/الإرجاع/التتبع/تواصل) -->
<div class="overlay" id="infoOverlay">
  <div class="modal wide">
    <div class="m-head"><button class="m-close" data-close="infoOverlay">✕</button><h3 id="infoTitle"></h3></div>
    <div class="m-body" id="infoBody"></div>
  </div>
</div>

<!-- Invoice modal -->
<div class="overlay" id="invOverlay">
  <div class="modal wide">
    <div class="m-head"><button class="m-close" data-close="invOverlay">✕</button><h3>🧾 <span data-i="invoiceT"></span></h3></div>
    <div class="m-body" id="invBody"></div>
  </div>
</div>

<!-- Seller hub -->
<div class="overlay" id="hubOverlay">
  <div class="modal xl">
    <div class="m-head"><button class="m-close" data-close="hubOverlay">✕</button><h3 data-i="sellerHub"></h3></div>
    <div class="m-body" id="hubBody"></div>
  </div>
</div>

<div class="toast" id="toast"><span class="ok">✔</span><span id="toastMsg"></span></div>

<script src="js/config.js"></script>
<script src="js/i18n.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
