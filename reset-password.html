<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>كلمة مرور جديدة | ALSHAYEB SHOP</title>
  <link rel="stylesheet" href="css/storely.css">
</head>
<body data-no-shell="1">
  <main class="auth-page">
    <section class="auth-card">
      <a class="brand centered" href="login.html">
        <span class="brand-title">ALSHAYEB SHOP</span>
        <small class="brand-sub">كلمة مرور جديدة</small>
      </a>

      <div id="resetWaiting" class="auth-lead">جاري التحقق من الرابط…</div>

      <form id="resetForm" class="stack-form auth-panel" hidden>
        <p class="auth-lead">اختر كلمة مرور جديدة (6 أحرف على الأقل).</p>
        <input id="newPassword" type="password" placeholder="كلمة المرور الجديدة" minlength="6" required>
        <input id="confirmPassword" type="password" placeholder="تأكيد كلمة المرور" minlength="6" required>
        <button class="primary-btn" type="submit">حفظ كلمة المرور</button>
      </form>

      <div id="resetMessage" class="form-message"></div>
      <a href="login.html" class="auth-back">← العودة لتسجيل الدخول</a>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/db-config.js"></script>
  <script src="js/database.js"></script>
  <script src="js/storely-data.js"></script>
  <script src="js/reset-password.js"></script>
</body>
</html>
