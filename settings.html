<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إعدادات | متجر الشايب</title>
  <link rel="stylesheet" href="css/storely.css">
</head>
<body>
  <main class="page-shell">
    <h1 class="page-title" id="settingsTitle">إعدادات</h1>
    <p class="page-lead" id="settingsLead">كلمة المرور، الدفع، وطلب المتجر.</p>

    <section class="panel-card">
      <h2 id="passwordSection">كلمة المرور</h2>
      <form id="passwordForm" class="stack-form">
        <label id="currentPasswordLabel">الحالية<input id="currentPassword" type="password"></label>
        <label id="newPasswordLabel">الجديدة<input id="newPassword" type="password" minlength="6"></label>
        <label id="confirmPasswordLabel">تأكيد<input id="confirmPassword" type="password" minlength="6"></label>
        <button class="secondary-btn" id="changePasswordBtn" type="submit">تغيير كلمة المرور</button>
      </form>
      <div id="passwordMessage" class="form-message"></div>
    </section>

    <section class="panel-card">
      <h2 id="paymentSection">الدفع</h2>
      <p id="shamOnlyNote">الدفع عبر شام كاش فقط على شايب شوب.</p>
    </section>

    <section class="panel-card" id="store">
      <h2 id="storeSection">طلب فتح متجر / بيع منتجات</h2>
      <p id="storeSectionLead">إذا عندك متجر، عبّي البيانات ووافق على العمولة 10%.</p>
      <form id="storeForm" class="stack-form">
        <label id="storeNameLabel">اسم المتجر<input id="storeName" type="text" required></label>
        <label id="storeSlugLabel">رابط المتجر<input id="storeSlug" type="text" placeholder="my-shop" required></label>
        <label id="storeLocationLabel">موقع المتجر<input id="storeLocation" type="text" required></label>
        <label id="storeDescLabel">نبذة عن المتجر<textarea id="storeDescription" rows="3" required></textarea></label>
        <label id="productTitleLabel">أول منتج<input id="productTitle" type="text" required></label>
        <label id="productPriceLabel">السعر (ل.س)<input id="productPrice" type="number" min="1" required></label>
        <label id="productCategoryLabel">التصنيف<select id="productCategory" required></select></label>
        <label class="agreement-inline" id="agreeCommissionLabel"><input id="agreeCommission" type="checkbox" required> أوافق على عمولة 10%</label>
        <button class="primary-btn" id="submitStoreBtn" type="submit">تقديم طلب المتجر</button>
      </form>
      <div id="storeMessage" class="form-message"></div>
    </section>
    <section class="panel-card danger-zone">
      <h2 id="deleteAccountSection">حذف الحساب</h2>
      <p id="deleteAccountLead">حذف حسابك نهائياً مع جميع بياناتك المحلية.</p>
      <button type="button" class="danger-btn" id="deleteAccountBtn">حذف الحساب</button>
      <div id="deleteMessage" class="form-message"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/db-config.js"></script>
  <script src="js/database.js"></script>
  <script src="js/storely-data.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/desktop-shell.js"></script>
  <script src="js/nav-shell.js"></script>
  <script src="js/settings.js"></script>
</body>
</html>
