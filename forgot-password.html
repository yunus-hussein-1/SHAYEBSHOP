<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نسيت كلمة السر | متجر الشايب</title>
  <link rel="stylesheet" href="css/storely.css">
</head>
<body data-no-shell="1">
  <main class="auth-page">
    <section class="auth-card">
      <a class="brand centered" href="login.html">
        <span class="brand-title">متجر الشايب</span>
        <small class="brand-sub">إعادة تعيين كلمة المرور</small>
      </a>
      <p class="auth-lead">أدخل بريدك الإلكتروني المسجّل. إذا كان موجوداً، نرسل لك رابطاً لتغيير كلمة المرور.</p>

      <form id="forgotForm" class="stack-form auth-panel active">
        <input id="forgotEmail" type="email" placeholder="البريد الإلكتروني" required autocomplete="email">
        <button class="primary-btn" type="submit">إرسال رابط التغيير</button>
      </form>

      <div id="forgotMessage" class="form-message"></div>
      <a href="login.html" class="auth-back">← العودة لتسجيل الدخول</a>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/db-config.js"></script>
  <script src="js/database.js"></script>
  <script src="js/storely-data.js"></script>
  <script src="js/forgot-password.js"></script>
</body>
</html>
