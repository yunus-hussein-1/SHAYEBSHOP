<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بيع على شايب شوب</title>
  <link rel="stylesheet" href="css/storely.css">
</head>
<body>
  <div class="desktop-sell-hero">
    <h1 id="sellTitle">نمِّ أعمالك مع شايب شوب!</h1>
    <p id="sellLead">انضم إلى منصتنا وابدأ البيع اليوم بعملة سورية.</p>
  </div>
  <div class="desktop-sell-cards sell-single" id="sellCards">
    <article class="desktop-sell-card">
      <div class="emoji">👕🎮👶</div>
      <h3 id="sellMarketTitle">سوق شايب شوب</h3>
      <p id="sellMarketDesc">بيع الألبسة والإلكترونيات لملايين المشترين في سوريا.</p>
      <a href="create.html" class="primary-btn" id="sellMarketBtn">التقديم إلى السوق</a>
    </article>
  </div>

  <main class="app-screen mobile-only" style="padding:20px">
    <h1 id="sellMobileTitle">بيع على شايب شوب</h1>
    <p id="sellMobileLead">افتح متجرك وابدأ البيع بالليرة السورية.</p>
    <a href="create.html" class="primary-btn full" style="margin-top:16px" id="sellMobileBtn">إنشاء متجر</a>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/db-config.js"></script>
  <script src="js/database.js"></script>
  <script src="js/storely-data.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/desktop-shell.js"></script>
  <script src="js/nav-shell.js"></script>
  <script>
    storelyInit().then(() => {
      storelyApplyLang();
      const t = (k) => storelyT(k);
      document.title = `${t("sellTitle")} | ${storelySiteName()}`;
      document.getElementById("sellTitle").textContent = t("sellTitle");
      document.getElementById("sellLead").textContent = t("sellLead");
      document.getElementById("sellMarketTitle").textContent = t("sellMarket");
      document.getElementById("sellMarketBtn").textContent = storelyGetLang() === "en" ? "Apply to Marketplace" : "التقديم إلى السوق";
      document.getElementById("sellMobileTitle").textContent = t("sellTitle");
      document.getElementById("sellMobileLead").textContent = t("sellLead");
      document.getElementById("sellMobileBtn").textContent = storelyGetLang() === "en" ? "Create Store" : "إنشاء متجر";
    });
  </script>
</body>
</html>
