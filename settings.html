<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إعدادات | متجر الشايب</title>
  <link rel="stylesheet" href="css/storely.css">
</head>
<body>
  <main class="page-shell">
    <h1 class="page-title">⚙️ إعدادات</h1>
    <p class="page-lead">كلمة المرور، الدفع، وطلب المتجر.</p>

    <section class="panel-card">
      <h2>كلمة المرور</h2>
      <form id="passwordForm" class="stack-form">
        <label>الحالية<input id="currentPassword" type="password"></label>
        <label>الجديدة<input id="newPassword" type="password" minlength="6"></label>
        <label>تأكيد<input id="confirmPassword" type="password" minlength="6"></label>
        <button class="secondary-btn" type="submit">تغيير كلمة المرور</button>
      </form>
      <div id="passwordMessage" class="form-message"></div>
    </section>

    <section class="panel-card">
      <h2>طريقة الدفع <small>(اختياري)</small></h2>
      <form id="paymentForm" class="stack-form">
        <select id="paymentMethod">
          <option value="">— اختر لاحقاً —</option>
          <option value="تسليم باليد">تسليم باليد</option>
          <option value="شام كاش">شام كاش</option>
        </select>
        <button class="secondary-btn" type="submit">حفظ</button>
      </form>
      <div id="paymentMessage" class="form-message"></div>
    </section>

    <section class="panel-card" id="store">
      <h2>طلب فتح متجر / بيع منتجات</h2>
      <p>إذا عندك متجر، عبّي البيانات ووافق على العمولة 10%.</p>
      <form id="storeForm" class="stack-form">
        <label>اسم المتجر<input id="storeName" type="text" required></label>
        <label>رابط المتجر<input id="storeSlug" type="text" placeholder="my-shop" required></label>
        <label>موقع المتجر<input id="storeLocation" type="text" placeholder="المدينة / العنوان" required></label>
        <label>نبذة عن المتجر<textarea id="storeDescription" rows="3" required></textarea></label>
        <label>أول منتج<input id="productTitle" type="text" required></label>
        <label>السعر (ل.س)<input id="productPrice" type="number" min="1" required></label>
        <label>التصنيف<select id="productCategory" required></select></label>
        <label class="agreement-inline"><input id="agreeCommission" type="checkbox" required> أوافق على عمولة 10%</label>
        <button class="primary-btn" type="submit">تقديم طلب المتجر</button>
      </form>
      <div id="storeMessage" class="form-message"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/db-config.js"></script>
  <script src="js/database.js"></script>
  <script src="js/storely-data.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/nav-shell.js"></script>
  <script src="js/settings.js"></script>
</body>
</html>
