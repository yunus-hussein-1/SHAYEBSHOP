<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سلة المشتريات | شايب شوب</title>
  <link rel="stylesheet" href="css/storely.css">
</head>
<body>
  <!-- Desktop cart -->
  <div class="desktop-only">
    <div class="desktop-main">
      <h1 class="desktop-page-title" id="desktopCartTitle">سلتي</h1>
      <div class="desktop-two-col">
        <div>
          <div id="desktopCartEmpty" class="desktop-checkout-section" hidden></div>
          <div id="desktopCartSellers"></div>
        </div>
        <div id="desktopCartSummary"></div>
      </div>
    </div>
  </div>

  <!-- Mobile cart -->
  <main class="app-screen cart-screen mobile-only">
    <header class="mobile-page-header">
      <h1 id="cartPageTitle">سلة مشترياتك</h1>
      <button type="button" class="icon-plain-btn" id="shareCartBtn">↗</button>
    </header>

    <section id="cartEmpty" class="cart-empty-state app-card"></section>
    <section id="cartFilled" class="cart-filled" hidden>
      <div id="cartItems" class="cart-list"></div>
      <div class="cart-summary app-card">
        <span id="cartTotalLabel">الإجمالي</span>
        <strong id="cartTotal">0 ل.س</strong>
        <a id="checkoutBtn" href="#" class="primary-btn full">ادفع الآن</a>
      </div>
    </section>

    <section class="cart-tabs">
      <button type="button" class="cart-tab active" id="prevTabBtn">سبق إضافته</button>
      <button type="button" class="cart-tab" id="favTabBtn">المفضلة</button>
    </section>
    <div id="cartSuggestions" class="cart-suggestions"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/db-config.js"></script>
  <script src="js/database.js"></script>
  <script src="js/storely-data.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/desktop-shell.js"></script>
  <script src="js/nav-shell.js"></script>
  <script src="js/cart-storely.js"></script>
</body>
</html>
