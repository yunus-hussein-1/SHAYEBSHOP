<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إتمام الطلب | ALSHAYEB SHOP</title>
  <link rel="stylesheet" href="css/storely.css">
</head>
<body>
  <main class="checkout-layout">
    <section class="checkout-card">
      <h1>إتمام الطلب والدفع</h1>
      <p class="checkout-lead">جميع الأسعار بالليرة السورية (ل.س)</p>
      <div id="selectedPlan" class="selected-plan"></div>

      <form id="paymentForm" class="form-grid">
        <label id="payerNameLabel">الاسم<input id="payerName" type="text" required></label>
        <label id="payerPhoneLabel">رقم سوري<input id="payerPhone" type="tel" placeholder="09xxxxxxxx" required></label>
        <label class="full" id="payerAddressLabel">موقع التسليم / اللوكيشن<textarea id="payerAddress" required placeholder="المدينة، الحي، معلم قريب..."></textarea></label>
        <label id="deliveryTimeLabel">موعد الاستلام المطلوب
          <select id="deliveryTime" required>
            <option value="">اختر الموعد</option>
            <option value="صباحاً (9-12)">صباحاً (9-12)</option>
            <option value="ظهراً (12-3)">ظهراً (12-3)</option>
            <option value="مساءً (3-6)">مساءً (3-6)</option>
            <option value="ليلاً (6-9)">ليلاً (6-9)</option>
          </select>
        </label>

        <div class="full payment-method-box">
          <strong id="paymentMethodTitle">طريقة الدفع</strong>
          <label class="payment-option"><input type="radio" name="payMethod" value="hand" checked> <span id="handPayText">تسليم باليد — الدفع عند الاستلام (ل.س)</span></label>
          <label class="payment-option"><input type="radio" name="payMethod" value="sham_cash"> <span id="shamPayText">شام كاش — الدفع بالليرة السورية</span></label>
        </div>

        <div id="shamCashBox" class="sham-cash-box full" style="display:none;">
          <strong id="shamCashTitle">تحويل شام كاش</strong>
          <p id="shamCashHint">حوّل المبلغ إلى الرقم التالي ثم أكّد الطلب:</p>
          <img src="assets/images/sham-cash-barcode.svg" alt="Sham Cash Barcode" class="sham-cash-barcode">
          <p class="sham-cash-meta"><span id="shamCashAccountLabel">اسم الحساب:</span> <strong id="shamCashAccountName">—</strong></p>
          <div class="sham-cash-number" id="shamCashNumber">—</div>
          <label id="shamCashRefLabel">رقم عملية التحويل<input id="shamCashRef" type="text" placeholder="اختياري"></label>
        </div>

        <label class="full" id="payerNotesLabel">ملاحظات<input id="payerNotes" type="text" placeholder="اختياري"></label>
        <button class="primary-btn full" type="submit" id="submitOrderBtn">تأكيد الطلب والدفع</button>
      </form>
      <div id="paymentMessage" class="form-message"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/db-config.js"></script>
  <script src="js/database.js"></script>
  <script src="js/storely-data.js"></script>
  <script src="js/nav-shell.js"></script>
  <script src="js/payment-storely.js"></script>
</body>
</html>
