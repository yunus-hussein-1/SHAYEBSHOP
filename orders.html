<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مشترياتي | شايب شوب</title>
  <link rel="stylesheet" href="css/storely.css">
</head>
<body>
  <div class="desktop-only">
    <div class="desktop-main">
      <div class="desktop-account-layout">
        <div id="desktopAccountSidebar"></div>
        <div class="desktop-form-panel">
          <h2 id="ordersPageTitle">مشترياتي</h2>
          <h3 id="newOrdersTitle">طلبات جديدة</h3>
          <div id="newOrdersList" class="orders-list"></div>
          <h3 id="pastOrdersTitle" style="margin-top:24px">مشتريات سابقة</h3>
          <div id="pastOrdersList" class="orders-list"></div>
        </div>
      </div>
    </div>
  </div>

  <main class="app-screen mobile-only">
    <header class="mobile-page-header">
      <a href="profile.html" class="back-link">›</a>
      <h1 id="mobileOrdersTitle">مشترياتي</h1>
    </header>
    <section class="app-card">
      <h2 id="mobileNewTitle">طلبات جديدة</h2>
      <div id="mobileNewOrders"></div>
    </section>
    <section class="app-card">
      <h2 id="mobilePastTitle">مشتريات سابقة</h2>
      <div id="mobilePastOrders"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/db-config.js"></script>
  <script src="js/database.js"></script>
  <script src="js/storely-data.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/desktop-shell.js"></script>
  <script src="js/nav-shell.js"></script>
  <script src="js/orders.js"></script>
</body>
</html>
